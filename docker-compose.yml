services:
  mongodb:
    image: mongo:7
    container_name: co-tuong-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    container_name: co-tuong-server
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/co_tuong
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - '4000:4000'

  client:
    build:
      context: ./client
      args:
        VITE_SERVER_URL: http://localhost:4000
    container_name: co-tuong-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '5173:80'

volumes:
  mongo_data:
